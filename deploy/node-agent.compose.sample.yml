services:
  vpn-node-agent:
    build:
      context: ..
      dockerfile: src/NodeAgent/VpnNodeAgent/Dockerfile
    network_mode: host
    volumes:
      - /etc/wireguard:/etc/wireguard:ro
      - /etc/ssl/private/node-agent.pfx:/app/certs/node-agent.pfx:ro
    environment:
      ASPNETCORE_Kestrel__Certificates__Default__Path: /app/certs/node-agent.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: change-me
      Agent__AgentIdentifier: node-01
      Agent__Hostname: vpn-node-01
      Agent__ConfigDirectory: /etc/wireguard
      Agent__AllowedClientThumbprints__0: REPLACE_WITH_CONTROL_PLANE_CLIENT_CERT_THUMBPRINT
    restart: unless-stopped
