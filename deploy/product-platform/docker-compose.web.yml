version: "3.9"

services:
  product-platform-web:
    build:
      context: ../..
      dockerfile: frontend/product-platform-web/Dockerfile
    container_name: product-platform-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../../frontend/product-platform-web/nginx.proxy.conf:/etc/nginx/conf.d/default.conf:ro
