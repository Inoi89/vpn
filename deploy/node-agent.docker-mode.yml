services:
  vpn-node-agent:
    build:
      context: ..
      dockerfile: src/NodeAgent/VpnNodeAgent/Dockerfile
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../certs:/app/certs:ro
    environment:
      ASPNETCORE_Kestrel__Certificates__Default__Path: /app/certs/node-agent-server.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: changeit
      Agent__AgentIdentifier: amnezia-node-01
      Agent__Hostname: amnezia-node-01
      Agent__AgentVersion: 1.0.0
      Agent__OperationMode: Docker
      Agent__DockerExecutablePath: docker
      Agent__DockerContainerName: amnezia-awg
      Agent__ConfigDirectory: /opt/amnezia/awg
      Agent__ConfigSearchPatterns__0: wg0.conf
      Agent__ConfigSearchPatterns__1: clientsTable
      Agent__AllowedClientThumbprints__0: ${CONTROL_PLANE_CLIENT_CERT_THUMBPRINT}
