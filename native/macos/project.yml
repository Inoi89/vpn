name: etoVPNMac

options:
  bundleIdPrefix: com.etovpn
  createIntermediateGroups: true

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: 11.0
    SWIFT_VERSION: 5.0

targets:
  etoVPNMacShared:
    type: framework
    platform: macOS
    sources:
      - path: shared/Sources/etoVPNMacShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.etovpn.shared
        PRODUCT_NAME: etoVPNMacShared
        GENERATE_INFOPLIST_FILE: YES

  etoVPNMacBridge:
    type: application
    platform: macOS
    sources:
      - path: bridge/Sources/etoVPNMacBridge
    info:
      path: bridge/Info.plist
    entitlements:
      path: bridge/etoVPNMacBridge.entitlements
    dependencies:
      - target: etoVPNMacShared
      - target: etoVPNPacketTunnel
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.etovpn.bridge
        PRODUCT_NAME: etoVPNMacBridge
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic

  etoVPNPacketTunnel:
    type: app-extension
    platform: macOS
    sources:
      - path: packet-tunnel/Sources/etoVPNPacketTunnel
      - path: ../../.research/amnezia-client/client/3rd/amneziawg-apple/Sources/WireGuardKit
      - path: ../../.research/amnezia-client/client/3rd/amneziawg-apple/Sources/WireGuardKitC
      - path: ../../.research/amnezia-client/client/3rd/amneziawg-apple/Sources/Shared/Model/TunnelConfiguration+WgQuickConfig.swift
      - path: ../../.research/amnezia-client/client/3rd/amneziawg-apple/Sources/Shared/Model/String+ArrayConversion.swift
    info:
      path: packet-tunnel/Info.plist
    entitlements:
      path: packet-tunnel/etoVPNPacketTunnel.entitlements
    dependencies:
      - target: etoVPNMacShared
      - sdk: Network.framework
      - sdk: NetworkExtension.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.etovpn.packet-tunnel
        PRODUCT_NAME: etoVPNPacketTunnel
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        CLANG_ENABLE_MODULES: YES
        ENABLE_BITCODE: NO
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/../../.research/amnezia-client/client
          - $(SRCROOT)/.generated/wireguard-go
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/.generated/wireguard-go
        OTHER_LDFLAGS:
          - -lwg-go
          - -lresolv
        SWIFT_OBJC_BRIDGING_HEADER: $(SRCROOT)/../../.research/amnezia-client/client/macos/networkextension/WireGuardNetworkExtension-Bridging-Header.h
        SWIFT_PRECOMPILE_BRIDGING_HEADER: NO
