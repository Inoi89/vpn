server {
  listen 80;
  server_name etovpn.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name etovpn.com;

  ssl_certificate /etc/letsencrypt/live/etovpn.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/etovpn.com/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_verify_client off;

  root /usr/share/nginx/html;
  index index.html;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /favicon.ico {
    try_files /favicon.ico =404;
    access_log off;
    log_not_found off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://93.100.54.80;
    proxy_http_version 1.1;

    proxy_set_header Host api.etojesim.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
